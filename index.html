<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Médecin - V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6 font-sans text-gray-800 min-h-screen flex items-center justify-center">

    <div id="ecran-connexion" class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Connexion Cabinet</h2>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email du médecin" class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="password" placeholder="Mot de passe" class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-500 outline-none">
            <div class="flex gap-2">
                <button onclick="seConnecter()" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded font-bold w-full transition">Se connecter</button>
                <button onclick="creerCompte()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 p-2 rounded font-bold w-full transition">Créer un compte</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="bg-white p-6 rounded-lg shadow-md w-full max-w-7xl hidden flex-col gap-6">
        
        <div class="flex justify-between items-center bg-gray-50 p-4 rounded-lg border">
            <h2 class="text-2xl font-bold">Cabinet Médical Pro</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm bg-yellow-100 text-yellow-800 px-3 py-1 rounded font-mono border border-yellow-200">
                    Lien patients : <a id="lien-patient" target="_blank" class="text-blue-600 underline"></a>
                </span>
                <button onclick="seDeconnecter()" class="text-red-600 hover:underline text-sm font-semibold">Déconnexion</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            
            <div class="space-y-4">
                <div class="bg-white border p-4 rounded-lg shadow-sm">
                    <h3 class="font-bold mb-3">Enregistrer un Patient</h3>
                    <div class="space-y-2">
                        <input type="text" id="nom" placeholder="Nom du patient" class="border p-2 rounded w-full text-sm outline-none">
                        <input type="text" id="phone" placeholder="Numéro WhatsApp" class="border p-2 rounded w-full text-sm outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="ajouterPatient(false)" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded text-sm font-bold transition">Standard</button>
                            <button onclick="ajouterPatient(true)" class="bg-red-600 hover:bg-red-700 text-white p-2 rounded text-sm font-bold transition">⚠️ Urgence</button>
                        </div>
                    </div>
                </div>

                <button onclick="appelerSuivant()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-5 rounded-lg text-lg font-black w-full transition shadow-md uppercase tracking-wider">
                    Appeler le Suivant
                </button>
            </div>

            <div class="space-y-4">
                <div class="bg-green-50 border border-green-200 p-4 rounded-lg shadow-sm h-full flex flex-col justify-between">
                    <div>
                        <h3 class="text-green-800 font-bold text-center border-b border-green-200 pb-2">En Consultation</h3>
                        <div id="patient-actuel" class="text-2xl font-black text-green-700 text-center py-6">Aucun</div>
                    </div>
                    <div id="actions-consultation" class="hidden flex-col gap-2">
                        <button id="btn-terminer" class="bg-green-600 hover:bg-green-700 text-white p-2 rounded font-bold text-sm transition">✓ Terminer la séance</button>
                        <button id="btn-pause" class="bg-orange-500 hover:bg-orange-600 text-white p-2 rounded font-bold text-sm transition">⏸ Absent / En pause</button>
                    </div>
                </div>
            </div>

            <div class="space-y-4 md:col-span-1">
                <div class="bg-white border p-4 rounded-lg shadow-sm">
                    <div class="flex justify-between items-center mb-3 border-b pb-2">
                        <h3 class="font-bold">File d'attente</h3>
                        <span id="compteur-attente" class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-xs font-bold">0</span>
                    </div>
                    <ul id="liste-attente" class="space-y-2 overflow-y-auto max-h-48 text-sm"></ul>
                </div>

                <div class="bg-orange-50 border border-orange-200 p-4 rounded-lg shadow-sm">
                    <h3 class="font-bold text-orange-800 mb-3 border-b border-orange-200 pb-2">Absents / En pause</h3>
                    <ul id="liste-pause" class="space-y-2 overflow-y-auto max-h-48 text-sm"></ul>
                </div>
            </div>

            <div class="bg-white border p-4 rounded-lg shadow-sm">
                <h3 class="font-bold mb-3 border-b pb-2">Historique du Jour</h3>
                <div class="overflow-y-auto max-h-96 text-xs">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-400 border-b">
                                <th class="pb-1">Nom</th>
                                <th class="pb-1 text-right">Attente</th>
                            </tr>
                        </thead>
                        <tbody id="liste-historique"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        var supabaseUrl = 'https://ecjuqepvfuvepsxlquiu.supabase.co';
        var supabaseKey = 'sb_publishable_C0qADTNee-jBxctsla6Saw_RGZMhegS';
        var db = supabase.createClient(supabaseUrl, supabaseKey);
        var userSession = null;

        db.auth.getSession().then(({ data }) => {
            if (data.session) activerDashboard(data.session.user);
        });

        async function seConnecter() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var { data, error } = await db.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else activerDashboard(data.user);
        }

        async function creerCompte() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var { error } = await db.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("Compte créé !");
        }

        function activerDashboard(user) {
            userSession = user;
            document.getElementById('ecran-connexion').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('flex');
            document.body.classList.remove('items-center', 'justify-center');
            
            var lien = window.location.origin + '/patient.html?cabinet=' + user.id;
            document.getElementById('lien-patient').innerText = "Ouvrir";
            document.getElementById('lien-patient').href = lien;

            chargerDonnies();

            db.channel('global-dashboard')
              .on('postgres_changes', { event: '*', schema: 'public', table: 'file_attente' }, () => {
                  chargerDonnies();
              }).subscribe();
        }

        async function seDeconnecter() {
            await db.auth.signOut();
            window.location.reload();
        }

        async function chargerDonnies() {
            var debutJournee = new Date(); debutJournee.setHours(0,0,0,0);

            // 1. Récupérer toutes les données du jour pour ce médecin
            var { data: patients } = await db.from('file_attente')
                .select('*')
                .eq('medecin_id', userSession.id)
                .gte('heure_arrivee', debutJournee.toISOString());

            patients = patients || [];

            // Filtrer par listes
            var enAttente = patients.filter(p => p.statut === 'en_attente').sort((a,b) => new Date(a.heure_arrivee) - new Date(b.heure_arrivee));
            var enConsultation = patients.filter(p => p.statut === 'appele').sort((a,b) => new Date(b.heure_appel) - new Date(a.heure_appel));
            var enPause = patients.filter(p => p.statut === 'en_pause').sort((a,b) => new Date(b.heure_appel) - new Date(a.heure_appel));
            var termines = patients.filter(p => p.statut === 'termine').sort((a,b) => new Date(b.heure_appel) - new Date(a.heure_appel));

            // Rendre Liste Attente
            document.getElementById('compteur-attente').innerText = enAttente.length;
            var ulAttente = document.getElementById('liste-attente');
            ulAttente.innerHTML = enAttente.map((p, i) => `
                <li class="border-b pb-1.5 flex justify-between items-center">
                    <span class="truncate"><b>#${i+1}</b> ${p.nom_patient}</span>
                    ${p.numero_whatsapp === 'URGENT' ? '<span class="text-xs bg-red-100 text-red-700 px-1.5 py-0.5 rounded font-bold">Urgent</span>' : ''}
                </li>
            `).join('') || '<li class="text-gray-400 italic">Aucun patient</li>';

            // Rendre Patient Actuel en Consultation
            var divActuel = document.getElementById('patient-actuel');
            var divActions = document.getElementById('actions-consultation');
            if (enConsultation.length > 0) {
                var c = enConsultation[0];
                divActuel.innerHTML = `<span class="block text-xl font-bold">${c.nom_patient}</span>`;
                divActions.classList.remove('hidden');
                divActions.classList.add('flex');
                
                document.getElementById('btn-terminer').onclick = () => changerStatut(c.id, 'termine');
                document.getElementById('btn-pause').onclick = () => changerStatut(c.id, 'en_pause');
            } else {
                divActuel.innerText = "Aucun";
                divActions.classList.add('hidden');
            }

            // Rendre Patients en Pause
            var ulPause = document.getElementById('liste-pause');
            ulPause.innerHTML = enPause.map(p => `
                <li class="border-b pb-1 flex justify-between items-center bg-white p-1 rounded border">
                    <span class="truncate font-semibold">${p.nom_patient}</span>
                    <button onclick="changerStatut('${p.id}', 'appele')" class="bg-orange-500 hover:bg-orange-600 text-white text-xs px-2 py-1 rounded font-bold">Rappeler</button>
                </li>
            `).join('') || '<li class="text-gray-400 italic">Aucun</li>';

            // Rendre Historique
            var tbody = document.getElementById('liste-historique');
            tbody.innerHTML = termines.map(p => {
                var diff = p.heure_appel && p.heure_arrivee ? Math.round((new Date(p.heure_appel) - new Date(p.heure_arrivee)) / 60000) : 0;
                return `<tr class="border-b"><td class="py-1.5 truncate max-w-[100px]">${p.nom_patient}</td><td class="py-1.5 text-right text-gray-500">${diff} min</td></tr>`;
            }).join('') || '<tr><td class="text-gray-400 italic py-2">Vide</td></tr>';
        }

        async function ajouterPatient(estUrgent) {
            var nom = document.getElementById('nom').value;
            var phone = estUrgent ? 'URGENT' : document.getElementById('phone').value;
            if (!nom) return alert('Nom obligatoire');

            // Si c'est urgent, on triche proprement sur l'heure d'arrivée en la reculant d'un jour pour le propulser en haut du tri SQL
            var heureArrivee = estUrgent ? new Date(Date.now() - 86400000).toISOString() : new Date().toISOString();

            await db.from('file_attente').insert([{ 
                nom_patient: nom, 
                numero_whatsapp: phone,
                medecin_id: userSession.id,
                heure_arrivee: heureArrivee
            }]);
            
            document.getElementById('nom').value = '';
            document.getElementById('phone').value = '';
        }

        async function appelerSuivant() {
            var { data } = await db.from('file_attente')
                .select('*').eq('statut', 'en_attente').eq('medecin_id', userSession.id)
                .order('heure_arrivee', { ascending: true }).limit(1);

            if (data && data.length > 0) {
                changerStatut(data[0].id, 'appele');
            } else {
                alert('Plus personne en attente !');
            }
        }

        async function changerStatut(id, statut) {
            await db.from('file_attente').update({ 
                statut: statut,
                heure_appel: statut === 'appele' ? new Date().toISOString() : undefined
            }).eq('id', id);
        }
    </script>
</body>
</html>
