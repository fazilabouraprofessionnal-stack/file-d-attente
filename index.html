<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Médecin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6 font-sans text-gray-800 min-h-screen flex items-center justify-center">

    <!-- ÉCRAN DE CONNEXION -->
    <div id="ecran-connexion" class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Connexion Cabinet</h2>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email du médecin" class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="password" placeholder="Mot de passe" class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-500 outline-none">
            <div class="flex gap-2">
                <button onclick="seConnecter()" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded font-bold w-full transition">Se connecter</button>
                <button onclick="creerCompte()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 p-2 rounded font-bold w-full transition">Créer un compte</button>
            </div>
        </div>
    </div>

    <!-- TABLEAU DE BORD (Masqué par défaut) -->
    <div id="dashboard" class="bg-white p-6 rounded-lg shadow-md w-full max-w-6xl hidden flex-col gap-6">
        
        <!-- En-tête -->
        <div class="flex justify-between items-center bg-gray-50 p-4 rounded-lg border">
            <h2 class="text-2xl font-bold">Cabinet Médical</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm bg-yellow-100 text-yellow-800 px-3 py-1 rounded font-mono border border-yellow-200">
                    Lien patients : <a id="lien-patient" target="_blank" class="text-blue-600 underline"></a>
                </span>
                <button onclick="seDeconnecter()" class="text-red-600 hover:underline text-sm font-semibold">Déconnexion</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- COLONNE GAUCHE : Action & En cours -->
            <div class="space-y-6">
                <!-- Action -->
                <div class="bg-white border p-4 rounded-lg shadow-sm">
                    <h3 class="font-bold mb-3">Ajouter un patient</h3>
                    <div class="flex flex-col gap-2">
                        <input type="text" id="nom" placeholder="Nom du patient" class="border p-2 rounded w-full outline-none">
                        <input type="text" id="phone" placeholder="Numéro WhatsApp" class="border p-2 rounded w-full outline-none">
                        <button onclick="ajouterPatient()" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded font-bold transition">Ajouter</button>
                    </div>
                </div>

                <!-- Patient actuel -->
                <div class="bg-green-50 border border-green-200 p-4 rounded-lg shadow-sm text-center">
                    <h3 class="text-green-800 font-bold mb-2">Patient en consultation</h3>
                    <div id="patient-actuel" class="text-3xl font-black text-green-700 py-4">Aucun</div>
                    <p id="heure-actuel" class="text-sm text-green-600"></p>
                </div>

                <button onclick="appelerSuivant()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-4 rounded-lg text-xl font-bold w-full transition shadow-md">
                    Appeler le Suivant
                </button>
            </div>

            <!-- COLONNE MILIEU : File d'attente -->
            <div class="bg-white border p-4 rounded-lg shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg">Salle d'attente</h3>
                    <span id="compteur-attente" class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm font-bold">0</span>
                </div>
                <ul id="liste-attente" class="space-y-2 overflow-y-auto max-h-96"></ul>
            </div>

            <!-- COLONNE DROITE : Historique -->
            <div class="bg-white border p-4 rounded-lg shadow-sm">
                <h3 class="font-bold text-lg mb-4">Historique du jour</h3>
                <div class="overflow-y-auto max-h-96">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="border-b text-gray-500">
                                <th class="pb-2">Nom</th>
                                <th class="pb-2">Appelé à</th>
                                <th class="pb-2">Attente</th>
                            </tr>
                        </thead>
                        <tbody id="liste-historique"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        var supabaseUrl = 'https://ecjuqepvfuvepsxlquiu.supabase.co';
        var supabaseKey = 'sb_publishable_C0qADTNee-jBxctsla6Saw_RGZMhegS';
        var db = supabase.createClient(supabaseUrl, supabaseKey);
        var userSession = null;

        db.auth.getSession().then(({ data }) => {
            if (data.session) activerDashboard(data.session.user);
        });

        async function creerCompte() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var { error } = await db.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("Compte créé ! Connectez-vous maintenant.");
        }

        async function seConnecter() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var { data, error } = await db.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else activerDashboard(data.user);
        }

        function activerDashboard(user) {
            userSession = user;
            document.getElementById('ecran-connexion').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('flex');
            document.body.classList.remove('items-center', 'justify-center');
            
            var lien = window.location.origin + '/patient.html?cabinet=' + user.id;
            document.getElementById('lien-patient').innerText = lien;
            document.getElementById('lien-patient').href = lien;

            chargerListes();

            db.channel('dashboard-medecin')
              .on('postgres_changes', { event: '*', schema: 'public', table: 'file_attente' }, () => {
                  chargerListes();
              }).subscribe();
        }

        async function seDeconnecter() {
            await db.auth.signOut();
            window.location.reload();
        }

        function formaterHeure(dateString) {
            if (!dateString) return '-';
            var d = new Date(dateString);
            return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        }

        function calculerAttente(arrivee, appel) {
            if (!arrivee || !appel) return '-';
            var diffMs = new Date(appel) - new Date(arrivee);
            var diffMins = Math.round(diffMs / 60000);
            if (diffMins < 60) return diffMins + ' min';
            return Math.floor(diffMins / 60) + 'h' + (diffMins % 60) + 'm';
        }

        async function chargerListes() {
            var debutJournee = new Date();
            debutJournee.setHours(0,0,0,0);

            // 1. Charger la salle d'attente
            var { data: enAttente } = await db.from('file_attente')
                .select('*').eq('statut', 'en_attente').eq('medecin_id', userSession.id)
                .order('heure_arrivee', { ascending: true });
            
            document.getElementById('compteur-attente').innerText = enAttente ? enAttente.length : 0;
            var ul = document.getElementById('liste-attente');
            ul.innerHTML = '';
            
            if (enAttente && enAttente.length > 0) {
                enAttente.forEach((p, i) => {
                    ul.innerHTML += `<li class="border-b pb-2 text-md flex flex-col">
                        <span><b>#${i + 1}</b> ${p.nom_patient}</span>
                        <span class="text-xs text-gray-400">Arrivé à ${formaterHeure(p.heure_arrivee)}</span>
                    </li>`;
                });
            } else {
                ul.innerHTML = '<li class="text-gray-400 italic">Vide.</li>';
            }

            // 2. Charger l'historique et le patient actuel
            var { data: historique } = await db.from('file_attente')
                .select('*').eq('statut', 'appele').eq('medecin_id', userSession.id)
                .gte('heure_appel', debutJournee.toISOString())
                .order('heure_appel', { ascending: false });

            var tbody = document.getElementById('liste-historique');
            tbody.innerHTML = '';

            if (historique && historique.length > 0) {
                // Le premier de l'historique est le patient actuel
                var actuel = historique[0];
                document.getElementById('patient-actuel').innerText = actuel.nom_patient;
                document.getElementById('heure-actuel').innerText = "Appelé à " + formaterHeure(actuel.heure_appel);

                // Les suivants (ou tous) dans la table historique
                historique.forEach((p) => {
                    tbody.innerHTML += `<tr class="border-b">
                        <td class="py-2">${p.nom_patient}</td>
                        <td class="py-2 text-gray-600">${formaterHeure(p.heure_appel)}</td>
                        <td class="py-2 text-gray-600">${calculerAttente(p.heure_arrivee, p.heure_appel)}</td>
                    </tr>`;
                });
            } else {
                document.getElementById('patient-actuel').innerText = "Aucun";
                document.getElementById('heure-actuel').innerText = "";
                tbody.innerHTML = '<tr><td colspan="3" class="text-gray-400 italic py-2">Aucun historique.</td></tr>';
            }
        }

        async function ajouterPatient() {
            var nom = document.getElementById('nom').value;
            var phone = document.getElementById('phone').value;
            if (!nom) return alert('Le nom est obligatoire !');

            await db.from('file_attente').insert([{ 
                nom_patient: nom, 
                numero_whatsapp: phone,
                medecin_id: userSession.id
            }]);
            
            document.getElementById('nom').value = '';
            document.getElementById('phone').value = '';
        }

        async function appelerSuivant() {
            var { data } = await db.from('file_attente')
                .select('*').eq('statut', 'en_attente').eq('medecin_id', userSession.id)
                .order('heure_arrivee', { ascending: true }).limit(1);

            if (data && data.length > 0) {
                await db.from('file_attente').update({ 
                    statut: 'appele',
                    heure_appel: new Date().toISOString()
                }).eq('id', data[0].id);
            } else {
                alert('La file d\'attente est vide !');
            }
        }
    </script>
</body>
</html>
