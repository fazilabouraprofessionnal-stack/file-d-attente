<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabinet Médical Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-slate-800 min-h-screen">

    <div id="ecran-connexion" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border mt-20">
        <h2 class="text-2xl font-bold mb-6 text-center text-slate-700">Accès Médecin</h2>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email" class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
            <input type="password" id="password" placeholder="Mot de passe" class="border p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
            <div class="flex gap-2 pt-2">
                <button onclick="seConnecter()" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold w-full transition">Connexion</button>
                <button onclick="creerCompte()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 p-3 rounded-lg font-bold w-full transition">Créer un compte</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="max-w-7xl mx-auto hidden flex-col gap-6">
        
        <div class="flex justify-between items-center bg-white p-5 rounded-xl border shadow-sm">
            <h2 class="text-2xl font-bold text-slate-800">Tableau de bord</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg border border-blue-100 font-medium">
                    Lien public : <a id="lien-patient" target="_blank" class="font-bold underline ml-1">Ouvrir</a>
                </span>
                <button onclick="seDeconnecter()" class="text-slate-500 hover:text-red-600 text-sm font-bold transition">Déconnexion</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="flex flex-col gap-6">
                
                <div class="bg-emerald-50 border border-emerald-200 p-6 rounded-xl shadow-sm flex flex-col items-center justify-center min-h-[200px]">
                    <h3 class="text-emerald-800 font-bold uppercase tracking-wider text-sm mb-4">En Consultation</h3>
                    <div id="patient-actuel" class="text-3xl font-black text-emerald-700 text-center mb-6">Aucun</div>
                    
                    <div id="actions-consultation" class="hidden w-full grid grid-cols-2 gap-2">
                        <button id="btn-pause" class="bg-amber-100 hover:bg-amber-200 text-amber-800 border border-amber-300 p-2 rounded-lg font-bold text-sm transition">⏸ Mettre en pause</button>
                        <button id="btn-terminer" class="bg-emerald-600 hover:bg-emerald-700 text-white p-2 rounded-lg font-bold text-sm transition">✓ Terminer</button>
                    </div>
                </div>

                <button onclick="appelerSuivant()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-6 rounded-xl text-xl font-black w-full transition shadow-md uppercase tracking-widest">
                    Appeler le Suivant
                </button>

                <div class="bg-white border p-5 rounded-xl shadow-sm">
                    <h3 class="font-bold text-slate-700 mb-4">Nouveau Patient</h3>
                    <div class="space-y-3">
                        <input type="text" id="nom" placeholder="Nom complet" class="border p-2.5 rounded-lg w-full text-sm outline-none bg-slate-50 focus:ring-2 focus:ring-blue-500">
                        <input type="text" id="phone" placeholder="Numéro WhatsApp" class="border p-2.5 rounded-lg w-full text-sm outline-none bg-slate-50 focus:ring-2 focus:ring-blue-500">
                        <div class="grid grid-cols-3 gap-2 pt-1">
                            <button onclick="ajouterPatient(false)" class="col-span-2 bg-slate-800 hover:bg-slate-900 text-white p-2.5 rounded-lg text-sm font-bold transition">Ajouter (Standard)</button>
                            <button onclick="ajouterPatient(true)" class="col-span-1 bg-red-100 hover:bg-red-200 text-red-700 border border-red-200 p-2.5 rounded-lg text-sm font-bold transition">Urgence</button>
                        </div>
                    </div>
                </div>

            </div>

            <div class="flex flex-col gap-6">
                <div class="bg-white border p-5 rounded-xl shadow-sm flex-1">
                    <div class="flex justify-between items-center mb-4 border-b pb-3">
                        <h3 class="font-bold text-slate-700">File d'attente</h3>
                        <span id="compteur-attente" class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md text-sm font-bold">0</span>
                    </div>
                    <ul id="liste-attente" class="space-y-2.5 overflow-y-auto max-h-[400px] text-sm"></ul>
                </div>

                <div class="bg-amber-50 border border-amber-200 p-5 rounded-xl shadow-sm">
                    <h3 class="font-bold text-amber-800 mb-3 border-b border-amber-200 pb-2 text-sm uppercase tracking-wide">Absents / En pause</h3>
                    <ul id="liste-pause" class="space-y-2 overflow-y-auto max-h-[200px] text-sm"></ul>
                </div>
            </div>

            <div class="bg-white border p-5 rounded-xl shadow-sm h-full">
                <h3 class="font-bold text-slate-700 mb-4 border-b pb-3">Historique du Jour</h3>
                <div class="overflow-y-auto max-h-[650px] text-sm">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-slate-400 border-b">
                                <th class="pb-2 font-medium">Nom</th>
                                <th class="pb-2 font-medium text-center">Attente</th>
                                <th class="pb-2 font-medium text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="liste-historique"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        var supabaseUrl = 'https://ecjuqepvfuvepsxlquiu.supabase.co';
        var supabaseKey = 'sb_publishable_C0qADTNee-jBxctsla6Saw_RGZMhegS';
        var db = supabase.createClient(supabaseUrl, supabaseKey);
        var userSession = null;

        db.auth.getSession().then(({ data }) => {
            if (data.session) activerDashboard(data.session.user);
        });

        async function seConnecter() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var { data, error } = await db.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else activerDashboard(data.user);
        }

        async function creerCompte() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var { error } = await db.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("Compte créé !");
        }

        function activerDashboard(user) {
            userSession = user;
            document.getElementById('ecran-connexion').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('flex');
            
            var lien = window.location.origin + '/patient.html?cabinet=' + user.id;
            document.getElementById('lien-patient').href = lien;

            chargerDonnies();

            db.channel('global-dashboard')
              .on('postgres_changes', { event: '*', schema: 'public', table: 'file_attente' }, () => {
                  chargerDonnies();
              }).subscribe();
        }

        async function seDeconnecter() {
            await db.auth.signOut();
            window.location.reload();
        }

        async function chargerDonnies() {
            var debutJournee = new Date(); debutJournee.setHours(0,0,0,0);

            var { data: patients, error } = await db.from('file_attente')
                .select('*')
                .eq('medecin_id', userSession.id)
                .gte('heure_arrivee', debutJournee.toISOString());

            if (error) { console.error(error); return; }
            patients = patients || [];

            var enAttente = patients.filter(p => p.statut === 'en_attente').sort((a,b) => new Date(a.heure_arrivee) - new Date(b.heure_arrivee));
            var enConsultation = patients.filter(p => p.statut === 'appele').sort((a,b) => new Date(b.heure_appel) - new Date(a.heure_appel));
            var enPause = patients.filter(p => p.statut === 'en_pause').sort((a,b) => new Date(b.heure_appel) - new Date(a.heure_appel));
            var termines = patients.filter(p => p.statut === 'termine').sort((a,b) => new Date(b.heure_appel) - new Date(a.heure_appel));

            // Rendre Liste Attente
            document.getElementById('compteur-attente').innerText = enAttente.length;
            var ulAttente = document.getElementById('liste-attente');
            ulAttente.innerHTML = enAttente.map((p, i) => `
                <li class="border border-slate-100 bg-slate-50 p-2.5 rounded-lg flex justify-between items-center">
                    <span class="truncate font-medium text-slate-700"><b>#${i+1}</b> ${p.nom_patient}</span>
                    ${p.numero_whatsapp === 'URGENT' ? '<span class="text-[10px] bg-red-500 text-white px-2 py-1 rounded-md font-bold tracking-wide uppercase">Urgence</span>' : ''}
                </li>
            `).join('') || '<li class="text-slate-400 italic text-center py-4">Aucun patient en attente</li>';

            // Rendre Patient Actuel en Consultation
            var divActuel = document.getElementById('patient-actuel');
            var divActions = document.getElementById('actions-consultation');
            if (enConsultation.length > 0) {
                var c = enConsultation[0];
                divActuel.innerHTML = `<span class="block text-2xl font-black">${c.nom_patient}</span>`;
                divActions.classList.remove('hidden');
                
                document.getElementById('btn-terminer').onclick = () => changerStatut(c.id, 'termine');
                document.getElementById('btn-pause').onclick = () => changerStatut(c.id, 'en_pause');
            } else {
                divActuel.innerText = "Aucun";
                divActions.classList.add('hidden');
            }

            // Rendre Patients en Pause
            var ulPause = document.getElementById('liste-pause');
            ulPause.innerHTML = enPause.map(p => `
                <li class="border border-amber-200 bg-white p-2 rounded-lg flex justify-between items-center">
                    <span class="truncate font-medium text-amber-900">${p.nom_patient}</span>
                    <button onclick="changerStatut('${p.id}', 'appele')" class="bg-amber-500 hover:bg-amber-600 text-white text-xs px-2.5 py-1.5 rounded-md font-bold transition">Rappeler</button>
                </li>
            `).join('') || '<li class="text-amber-600/50 italic text-center py-2">Aucun</li>';

            // Rendre Historique avec bouton Réintégrer
            var tbody = document.getElementById('liste-historique');
            tbody.innerHTML = termines.map(p => {
                var diff = p.heure_appel && p.heure_arrivee ? Math.round((new Date(p.heure_appel) - new Date(p.heure_arrivee)) / 60000) : 0;
                return `<tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                    <td class="py-3 truncate max-w-[120px] font-medium text-slate-700">${p.nom_patient}</td>
                    <td class="py-3 text-center text-slate-500 text-xs">${diff} min</td>
                    <td class="py-3 text-right">
                        <button onclick="reintegrerPatient('${p.id}')" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-md text-xs font-bold transition" title="Remettre en attente">↺</button>
                    </td>
                </tr>`;
            }).join('') || '<tr><td colspan="3" class="text-slate-400 italic text-center py-6">Historique vide</td></tr>';
        }

        async function ajouterPatient(estUrgent) {
            var nom = document.getElementById('nom').value;
            var phone = estUrgent ? 'URGENT' : document.getElementById('phone').value;
            if (!nom) return alert('Nom obligatoire');

            var debutJournee = new Date();
            debutJournee.setHours(0,0,0,0);
            var heureArrivee = estUrgent ? debutJournee.toISOString() : new Date().toISOString();

            await db.from('file_attente').insert([{ 
                nom_patient: nom, 
                numero_whatsapp: phone,
                medecin_id: userSession.id,
                heure_arrivee: heureArrivee
            }]);
            
            document.getElementById('nom').value = '';
            document.getElementById('phone').value = '';
            chargerDonnies(); // Force le rafraîchissement immédiat
        }

        async function appelerSuivant() {
            // 1. Clôturer proprement le patient actuel s'il y en a un (évite le bug des patients invisibles)
            var { data: actuel } = await db.from('file_attente').select('id').eq('statut', 'appele').eq('medecin_id', userSession.id);
            if (actuel && actuel.length > 0) {
                for (let p of actuel) {
                    await db.from('file_attente').update({ statut: 'termine' }).eq('id', p.id);
                }
            }

            // 2. Chercher le prochain
            var { data } = await db.from('file_attente')
                .select('*').eq('statut', 'en_attente').eq('medecin_id', userSession.id)
                .order('heure_arrivee', { ascending: true }).limit(1);

            if (data && data.length > 0) {
                await changerStatut(data[0].id, 'appele');
            } else {
                chargerDonnies();
                alert('Plus personne en attente !');
            }
        }

        async function changerStatut(id, statut) {
            await db.from('file_attente').update({ 
                statut: statut,
                heure_appel: statut === 'appele' ? new Date().toISOString() : null
            }).eq('id', id);
            chargerDonnies(); // Force le rafraîchissement immédiat
        }

        async function reintegrerPatient(id) {
            await db.from('file_attente').update({ 
                statut: 'en_attente',
                heure_arrivee: new Date().toISOString(),
                heure_appel: null
            }).eq('id', id);
            chargerDonnies(); // Force le rafraîchissement immédiat
        }
    </script>
</body>
</html>
